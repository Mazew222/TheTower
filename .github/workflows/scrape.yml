name: Scrape Tower Wiki

on:
  workflow_dispatch:
  schedule:
    - cron: "0 5 * * *" # daily at 05:00 UTC (midnight-ish US Central)

permissions:
  contents: write

jobs:
  scrape:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: "20"

      - name: Install
        run: npm ci || npm install

      - name: Scrape
        run: npm run scrape

      - name: Commit & push if changed
        run: |
          git config user.name "tower-wiki-bot"
          git config user.email "tower-wiki-bot@users.noreply.github.com"
          git add data/*.json
          if git diff --cached --quiet; then
            echo "No changes."
            exit 0
          fi
          git commit -m "Update scraped wiki data"
          git push
